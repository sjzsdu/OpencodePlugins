name: Publish to npm

on:
  push:
    tags:
      - 'emperor-v*'
      - 'commander-v*'
      - 'hive-v*'
      - 'superpower-v*'
      - 'stock-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Install plugin SDK dependencies
        run: bun install
        working-directory: .opencode

      - name: Type check
        run: bun run build

      - name: Determine plugin from tag
        id: plugin
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == emperor-v* ]]; then
            echo "dir=.opencode/plugins/emperor" >> $GITHUB_OUTPUT
            echo "name=emperor" >> $GITHUB_OUTPUT
            echo "version=${TAG#emperor-v}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == commander-v* ]]; then
            echo "dir=.opencode/plugins/commander" >> $GITHUB_OUTPUT
            echo "name=commander" >> $GITHUB_OUTPUT
            echo "version=${TAG#commander-v}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == hive-v* ]]; then
            echo "dir=.opencode/plugins/hive" >> $GITHUB_OUTPUT
            echo "name=hive" >> $GITHUB_OUTPUT
            echo "version=${TAG#hive-v}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == superpower-v* ]]; then
            echo "dir=.opencode/plugins/superpower" >> $GITHUB_OUTPUT
            echo "name=superpower" >> $GITHUB_OUTPUT
            echo "version=${TAG#superpower-v}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == stock-v* ]]; then
            echo "dir=.opencode/plugins/stock" >> $GITHUB_OUTPUT
            echo "name=stock" >> $GITHUB_OUTPUT
            echo "version=${TAG#stock-v}" >> $GITHUB_OUTPUT
          else
            echo "::error::Unknown tag pattern: $TAG"
            exit 1
          fi

      - name: Verify version matches package.json
        working-directory: ${{ steps.plugin.outputs.dir }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.plugin.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "✅ Version match: $PKG_VERSION"

      - name: Publish ${{ steps.plugin.outputs.name }}
        working-directory: ${{ steps.plugin.outputs.dir }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          npm config set provenance true
          npm publish --access public
