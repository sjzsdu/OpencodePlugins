name: CI

on:
  push:
    branches: [main]
    paths:
      - '.hive/**'
      - 'plugins/**'
      - 'tsconfig.json'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - '.hive/**'
      - 'plugins/**'
      - 'tsconfig.json'
      - 'package.json'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Type check
        run: bun run build

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Run tests (skip if no test files)
        run: |
          if find . -name '*.test.ts' -o -name '*.spec.ts' 2>/dev/null | grep -q .; then
            bun test
          else
            echo "No test files found, skipping tests"
          fi
